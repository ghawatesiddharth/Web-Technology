<div class="auth-container">
  <div class="auth-card">
    <h2>Login</h2>
    <form (ngSubmit)="onLogin()">
      <p *ngIf="errorMessage" class="error-text">{{errorMessage}}</p>
      
      <div class="input-group">
        <input type="email" name="email" [(ngModel)]="loginData.email" placeholder="Email" required>
      </div>
      
      <div class="input-group">
        <input type="password" name="password" [(ngModel)]="loginData.password" placeholder="Password" required>
      </div>
      
      <button type="submit" class="btn-primary">Sign In</button>
    </form>
    
    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/register">Register here</a></p>
    </div>
  </div>
</div>
